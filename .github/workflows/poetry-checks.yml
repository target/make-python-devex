name: poetry checks

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  diff-poetry-lock:
    # FIXME: Remove when https://github.com/target/make-python-devex/issues/119 is fixed
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    # This will post a comment on PRs when poetry.lock changes
    - name: Diff poetry.lock
      uses: target/diff-poetry-lock@d9fd592c4acfaffd16832da1afca34b9eb0546b9 # v0.2.0
